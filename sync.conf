[
  {
    "mod": "系统主机配置",
    "paths": [
      "/etc/hostname",
      "/etc/hosts",
      "/etc/resolv.conf"
    ]
  },
  {
    "mod": "SSH配置",
    "parent-path": "/etc/",
    "paths": [
      "ssh/sshd_config",
      "ssh/ssh_config"
    ]
  },
  {
    "mod": "网络配置",
    "paths": [
      "/etc/netplan/",
      "/etc/network/interfaces"
    ]
  },
  {
    "mod": "用户配置",
    "paths": [
      "/etc/passwd",
      "/etc/group",
      "/etc/shadow",
      "/etc/gshadow"
    ]
  },
  {
    "mod": "APT镜像源",
    "paths": [
      "/etc/apt/sources.list",
      "/etc/apt/sources.list.d/"
    ]
  },
  {
    "mod": "系统服务配置",
    "parent-path": "/etc/",
    "paths": [
      "systemd/",
      "init.d/"
    ]
  },
  {
    "mod": "脚本化备份示例",
    "script-path": "example_backup_script.sh",
    "description": "使用自定义脚本进行复杂备份的示例"
  }
]